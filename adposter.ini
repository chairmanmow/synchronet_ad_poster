; adposter.ini — defaults + mappings for UI and CLI batch mode

[paths]
; Where to look for ad files:
ads_dir = /sbbs/text/bbs_ads

[defaults]
; Defaults used by both UI and CLI (CLI flags can override these)
to = All
from = HM Derdoc
subject = [ANSI] futureland.today
fixed = yes

; Default ad category used by random batch posting
category = bbs_ad

[locations]
; Map your logical keys -> Synchronet sub-board internal codes
; (Use SCFG -> Message Areas -> Sub-boards -> Internal Code)
test    = LOCAL-TEST_ADS
local   = LOCAL-LOCAL_ADS
dovenet = DOVE-ADS
fsxnet  = FSX_ADS
tqwnet  = TQW_ADS
cheesenet = CHEESENETADVERTISEMENTS

; Optional per-file subject overrides (filename -> subject)
[overrides]
; future_beach.ans = Futureland Beach Party
; future_hair_metal.ans = Futureland Hair Metal Edition

; Optional per-file category overrides (filename -> category)
[categories]
cheesenet.ans = networks_ads
; future_beach.ans = bbs_ad
; fsx_network_spot.ans = networks_ads

; Optional rich per-file section (alternative to [overrides]/[categories])
; [ad:future_beach.ans]
; subject = Futureland Beach Party
; category = bbs_ad
